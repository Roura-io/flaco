display_information:
  name: flacoAi
  description: flacoAi — your local-only AI brain, powered by Roura.io
  background_color: "#0a0b0f"
  long_description: |
    flacoAi is a self-hosted, local-only AI assistant built by Roura.io. It
    shares one brain across Slack, TUI, and Web — so whatever you say in one
    place is remembered everywhere. Built on Ollama (qwen3:32b by default).
    No data leaves your homelab.

features:
  bot_user:
    display_name: flaco
    always_online: true

  slash_commands:
    - command: /reset
      description: Reset the current conversation and start fresh
      usage_hint: "(no arguments)"
      should_escape: false
    - command: /clear
      description: Clear the current conversation (alias for /reset)
      usage_hint: "(no arguments)"
      should_escape: false
    - command: /new
      description: Start a fresh conversation
      usage_hint: "(no arguments)"
      should_escape: false
    - command: /forget
      description: Forget this conversation and start fresh
      usage_hint: "(no arguments)"
      should_escape: false
    - command: /help
      description: List available flacoAi commands
      usage_hint: "(no arguments)"
      should_escape: false
    - command: /status
      description: Show flacoAi runtime status (model, memory, tools)
      usage_hint: "(no arguments)"
      should_escape: false
    - command: /brief
      description: Generate your Morning Brief from memory + open Jira
      usage_hint: "(no arguments)"
      should_escape: false
    - command: /research
      description: Web research with numbered citations
      usage_hint: "<topic>"
      should_escape: false
    - command: /shortcut
      description: Generate a real Siri Shortcut file
      usage_hint: "<name>: <what it should do>"
      should_escape: false
    - command: /scaffold
      description: Jira epic + stories + local git branch from an idea
      usage_hint: "<idea>"
      should_escape: false
    - command: /memories
      description: List everything flacoAi remembers about you
      usage_hint: "(no arguments)"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - commands
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - users:read
      - files:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
